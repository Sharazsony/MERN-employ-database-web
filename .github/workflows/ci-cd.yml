name: CI/CD Pipeline
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  # ---------- CI: Lint + basic checks ----------
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: mern/backend/package-lock.json
      - name: Install backend dependencies
        working-directory: ./mern/backend
        run: npm ci
      # Uncomment once you have backend tests set up
      # - name: Run backend tests
      #   working-directory: ./mern/backend
      #   run: npm test
  # ---------- Validate Docker builds work ----------
  docker-build-check:
    runs-on: ubuntu-latest
    needs: [test-backend]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build backend image (no push)
        uses: docker/build-push-action@v5
        with:
          context: ./mern/backend
          push: false
          tags: mern-app:backend-test
      - name: Build frontend image (no push)
        uses: docker/build-push-action@v5
        with:
          context: ./mern/frontend
          target: prod
          push: false
          tags: mern-app:frontend-test
  # ---------- CD: Push to Docker Hub (main branch only) ----------
  push-to-dockerhub:
    runs-on: ubuntu-latest
    needs: docker-build-check
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./mern/backend
          push: true
          tags: sharaz123/mern-app:backend
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./mern/frontend
          target: prod
          push: true
          tags: sharaz123/mern-app:frontend
          cache-from: type=gha
          cache-to: type=gha,mode=max
