name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  GHCR_REGISTRY: ghcr.io
  IMAGE_OWNER: sharazsony
  DOCKERHUB_OWNER: sharaz123

jobs:
  # ---------- CI: Lint + basic checks ----------
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: mern/backend/package-lock.json

      - name: Install backend dependencies
        working-directory: ./mern/backend
        run: npm ci

      # Uncomment once you have backend tests set up
      # - name: Run backend tests
      #   working-directory: ./mern/backend
      #   run: npm test

  # ---------- Validate Docker builds work ----------
  docker-build-check:
    runs-on: ubuntu-latest
    needs: [test-backend]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image (no push)
        uses: docker/build-push-action@v5
        with:
          context: ./mern/backend
          push: false
          tags: mern-app:backend-test

      - name: Build frontend image (no push)
        uses: docker/build-push-action@v5
        with:
          context: ./mern/frontend
          target: prod
          push: false
          tags: mern-app:frontend-test

  # ---------- CD: Push to Docker Hub AND GitHub Container Registry (main branch only) ----------
  push-images:
    runs-on: ubuntu-latest
    needs: docker-build-check
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write   # required to push images to GHCR
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./mern/backend
          push: true
          tags: |
            ${{ env.DOCKERHUB_OWNER }}/mern-app:backend
            ${{ env.GHCR_REGISTRY }}/${{ env.IMAGE_OWNER }}/mern-app-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./mern/frontend
          target: prod
          push: true
          tags: |
            ${{ env.DOCKERHUB_OWNER }}/mern-app:frontend
            ${{ env.GHCR_REGISTRY }}/${{ env.IMAGE_OWNER }}/mern-app-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
