services:
  backend:
    image: sharaz123/mern-app:backend
    ports:
      - "5050:5050"
    networks:
      - mern_network
    environment:
      MONGO_URI: mongodb://mongodb:27017/employees
    depends_on:
      mongodb:
        condition: service_healthy
  frontend:
    image: sharaz123/mern-app:frontend
    ports:
      - "8080:80"
    networks:
      - mern_network
    environment:
      REACT_APP_API_URL: http://backend:5050
  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    networks:
      - mern_network
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
networks:
  mern_network:
    driver: bridge
volumes:
  mongo-data:
    driver: local
